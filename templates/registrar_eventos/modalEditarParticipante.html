{% load static %}
<div class="modal fade" id="modalEditarParticipante" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <form id="formEditarParticipante" data-url="{% url 'editar_participante_ajax' %}">
        {% csrf_token %}

        <input type="hidden" name="id" id="edit_id">

        <div class="modal-header bg-dark text-white">
          <h5 class="modal-title">Editar participante</h5>
          <button type="button" class="btn-close bg-white" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <label for="edit_tipo_participante">Tipo de participante</label>
          <select class="form-control mb-2" id="edit_tipo_participante" name="tipo_participante" required>
            <option value="colaborador">Colaborador</option>
            <option value="directivo">Directivo</option>
          </select>

          <label for="edit_identificacion">Identificación</label>
          <input class="form-control mb-2" id="edit_identificacion" name="identificacion" placeholder="Identificación" required>

          <label for="edit_nombres">Nombres</label>
          <input class="form-control mb-2" id="edit_nombres" name="nombres" placeholder="Nombres" required>

          <label for="edit_apellidos">Apellidos</label>
          <input class="form-control mb-2" id="edit_apellidos" name="apellidos" placeholder="Apellidos" required>

          <label for="edit_agencia">Agencia</label>
          <select class="form-control mb-2" id="edit_agencia" name="agencia" required>
            <option value="">Seleccione una agencia</option>
            <option value="MOCOA">Mocoa</option>
            <option value="PUERTO ASIS">Puerto Asís</option>
            <option value="DORADA">Dorada</option>
            <option value="HORMIGA">Hormiga</option>
            <option value="ORITO">Orito</option>
            <option value="VILLA GARZON">Villa Garzón</option>
            <option value="PUERTO LEGUIZAMO">Puerto Leguízamo</option>
            <option value="SIBUNDOY">Sibundoy</option>
          </select>

          <div id="mensajeEditar"></div>

        </div>

        <div class="modal-footer">
          <button type="submit" class="btn btn-primary">Guardar</button>
          <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cancelar</button>
        </div>

      </form>

    </div>
  </div>
</div>

<script src="{% static 'js/modalEditarParticipante.js' %}"></script>
