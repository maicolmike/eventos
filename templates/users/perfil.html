{% extends 'inicio/base.html' %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/forms.css' %}">
<link rel="stylesheet" href="{% static 'css/botonRegister.css' %}">

<div class="container mt-5">

  {% include 'inicio/messages.html' %}

  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow">

        <div class="card-header bg-dark text-white">
          <h5 class="mb-0"><i class="fa-solid fa-pen-to-square text-primary me-2"></i>Mi perfil</h5>
        </div>

        <div class="card-body">

          <form class="form-create" method="post">
            {% csrf_token %}

            {% for field in form %}
              <div class="mb-3">
                
                {{ field.label_tag }}
                {{ field }}

                {% if field.errors %}
                  <div class="text-danger small">
                    {{ field.errors }}
                  </div>
                {% endif %}

              </div>
            {% endfor %}

            <button type="submit" class="btn btn-dark w-100 register-button">
              Guardar
            </button>

          </form>

        </div>

      </div>

    </div>
  </div>

</div>

{% endblock %}
