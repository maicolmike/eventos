<div class="modal fade" id="modalEditar" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <form id="formEditarUsuario">
        {% csrf_token %} <input type="hidden" name="id" id="edit_id">

        <div class="modal-header bg-dark text-white">
          <h5 class="modal-title">Editar Usuario</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <input class="form-control mb-2" id="edit_identificacion" name="identificacion" placeholder="Identificación" required>
          <input class="form-control mb-2" id="edit_nombres" name="nombres" placeholder="Nombres" required>
          <input class="form-control mb-2" id="edit_username" name="username" placeholder="Usuario" required>
          <input class="form-control mb-2" id="edit_email" name="userEmail" placeholder="Email" required>

          <select class="form-control mb-2" id="edit_agencia" name="agencia" required>
            <option value="">Seleccione una agencia</option>
            <option value="MOCOA">Mocoa</option>
            <option value="PUERTO ASIS">Puerto Asís</option>
            <option value="DORADA">Dorada</option>
            <option value="HORMIGA">Hormiga</option>
            <option value="ORITO">Orito</option>
            <option value="VILLA GARZON">Villa Garzón</option>
            <option value="PUERTO LEGUIZAMO">Puerto Leguízamo</option>
            <option value="SIBUNDOY">Sibundoy</option>
          </select>

          <select class="form-control mb-2" id="edit_superuser" name="tipousuario" required>
            <option value="">Seleccione un tipo de usuario</option>
            <option value="1">Administrador</option>
            <option value="0">Cliente</option>
          </select>

          <select class="form-control mb-2" id="edit_active" name="estado" required>
            <option value="">Seleccione un estado</option>
            <option value="1">Activo</option>
            <option value="0">Inactivo</option>
          </select>

          <div id="mensajeEditar"></div>
        </div>

        <div class="modal-footer">
          <button type="submit" class="btn btn-primary">Guardar</button>
          <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cancelar</button>
        </div>

      </form>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    // Escucha el clic en cualquier botón que tenga la clase 'btn-editar'
    document.querySelectorAll(".btn-editar").forEach(btn => {
        btn.addEventListener("click", function () {
            
            // Llena los campos del modal usando los atributos 'data-' (dataset) del botón pulsado
            document.getElementById("edit_id").value = this.dataset.id;
            document.getElementById("edit_identificacion").value = this.dataset.identificacion;
            document.getElementById("edit_nombres").value = this.dataset.nombres;
            document.getElementById("edit_username").value = this.dataset.username;
            document.getElementById("edit_email").value = this.dataset.email;
            document.getElementById("edit_agencia").value = this.dataset.agencia;

            // Convierte los valores booleanos (True/False) de Django a valores del select (1/0)
            document.getElementById("edit_superuser").value = this.dataset.superuser === "True" ? "1" : "0";
            document.getElementById("edit_active").value = this.dataset.active === "True" ? "1" : "0";

            // Limpia mensajes de alertas anteriores al abrir el modal
            document.getElementById("mensajeEditar").innerHTML = "";
        });
    });
});
</script>

<script>
document.getElementById("formEditarUsuario").addEventListener("submit", function(e) {
    e.preventDefault(); // Detiene la recarga automática de la página

    // Empaqueta todos los campos del formulario en un objeto FormData
    let formData = new FormData(this);

    // Envía los datos a la URL definida en Django
    fetch("{% url 'user_update_ajax' %}", {
        method: "POST",
        body: formData,
        headers: {
            // Envía el token CSRF en la cabecera para pasar la seguridad de Django
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        }
    })
    .then(response => response.json()) // Convierte la respuesta del servidor a formato JSON
    .then(data => {
        let mensaje = document.getElementById("mensajeEditar");

        if (data.status === "success") {
            // Muestra alerta verde de éxito
            mensaje.innerHTML = `<div class="alert alert-success">${data.message}</div>`;

            // Espera 1.2 segundos antes de cerrar el modal y recargar la tabla
            setTimeout(() => {
                let modalElement = document.getElementById('modalEditar');
                let modal = bootstrap.Modal.getInstance(modalElement);
                modal.hide();

                location.reload(); // Recarga la página para mostrar los datos actualizados
            }, 1200);

        } else {
            // Muestra alerta roja de error (ej: usuario duplicado) y mantiene el modal abierto
            mensaje.innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
        }
    })
    .catch(error => {
        console.error("Error en la petición:", error);
    });
});
</script>
