<form method="POST">
    {% csrf_token %}

    <div class="mb-3">
        {{ form.username.label_tag }}
        {{ form.username }}
    </div>

    <div class="mb-3">
        {{ form.password.label_tag }}
        {{ form.password }}
    </div>

    <button type="submit" class="btn btn-primary w-100">
        Iniciar sesión
    </button>
</form>
